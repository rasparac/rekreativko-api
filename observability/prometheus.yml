global:
  scrape_interval: "15s" # how often to scrape targets
  evaluation_interval: "15s" # how often to evaulate rules

  external_labels:
    cluster: "rekreativko-dev"
    environment: "development"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "alerts/*.yml"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: "prometheus"

  - job_name: "rekreativko"
    scrape_interval: "10s"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["gateway:8080"]
        labels:
          service: "gateway"

      - targets: ["identity:8081"]
        labels:
          service: "identity"

      - targets: ["account-profile:8082"]
        labels:
          service: "account-profile"

      - targets: ["outbox-publisher:8083"]
        labels:
          service: "outbox-publisher"

  # - job_name: "postgres"
  #   static_configs:
  #     - targets: ["postgres-exporter:9187"]

  # - job_name: "redis"
  #   static_configs:
  #     - targets: ["redis-exporter:9187"]
