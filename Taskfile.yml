# https://taskfile.dev

version: "3"

vars:
  GREETING: Hello, World!
  DB_HOST: localhost
  DB_USER: postgres
  DB_PASSWORD: postgres
  DB_NAME: rekreativko
  DB_URL: postgres://{{.DB_USER}}:{{.DB_PASSWORD}}@{{.DB_HOST}}/{{.DB_NAME}}?sslmode=disable
  MIGRATIONS_DIR: ./migrations
  APP_NAME: rekreativko

dotenv: [".env"]

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  #dev

  run:
    desc: Run the application
    cmds:
      - go run cmd/api/main.go

  build:
    desc: Build the application
    cmds:
      - go build -o bin/{{.APP_NAME}} cmd/api/main.go

  #docker

  docker:up:
    desc: Start docker containers
    cmds:
      - docker compose up -d --force-recreate
    status:
      - docker compose ps | grep -q "Up"

  docker:build:
    desc: Build all services
    cmds:
      - docker compose -f docker-compose.build.yml build

  docker:run:local-testing:
    desc: Run everything without context services
    cmds:
      - docker compose up -d --force-recreate jaeger prometheus grafana db redis nats

  docker:build-by-name:
    desc: Build a specific service
    cmds:
      - docker compose -f docker-compose.build.yml build {{.CLI_ARGS}}

  docker:down:
    desc: Stop docker containers
    cmds:
      - docker compose down --remove-orphans

  docker:restart:
    desc: Restart docker containers
    cmds:
      - task: docker:down
      - task: docker:up

  #migrations

  migrate:up:
    desc: Run all migrations
    deps: [docker:up]
    cmds:
      - migrate -path {{.MIGRATIONS_DIR}} -database {{.DB_URL}} up
      - echo "migrations applied successfully"

  migrate:down:
    desc: Revert all migrations
    deps: [docker:up]
    cmds:
      - migrate -path {{.MIGRATIONS_DIR}} -database {{.DB_URL}} down 1
      - echo "migration rolled back"

  migrate:down:all:
    desc: Revert all migrations
    deps: [docker:up]
    cmds:
      - migrate -path {{.MIGRATIONS_DIR}} -database {{.DB_URL}} down -all
      - echo "migrations reverted successfully"

  migrate:create:
    desc: Create a new migration (usage task migrate:create -- create_users_table)
    cmds:
      - |
        if [ -z "{{.CLI_ARGS}}" ]; then
          echo "Please provide a migration name"
          echo "Usage: task migrate:create -- <name>"
          exit 1
        fi
      - migrate create -ext sql -dir {{.MIGRATIONS_DIR}} -seq "{{.CLI_ARGS}}"
      - echo "migration created successfully"

  #test

  test:
    desc: Run all tests
    cmds:
      - go test -v ./...

  #deps

  deps:install:
    desc: Install dependencies
    cmds:
      - go mod download
      - go mod tidy

  deps:update:
    desc: Update dependencies
    cmds:
      - go get -u ./...
      - go mod tidy

  #tools

  tools:install:
    desc: Install tools
    cmds:
      - go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
      - go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@latest
      - go install golang.org/x/tools/cmd/goimports@latest
      - echo "tools installed successfully"

  #generate

  generate:
    desc: Run go generate
    cmds:
      - go generate ./...

  docs:swagger:
    desc: Generate swagger docs
    cmds:
      - swag init -g cmd/api/main.go -o docs --parseDependency --parseInternal
      - echo "swagger docs generated successfully"

  docs:serve:
    desc: Serve swagger docs
    deps: [docs:swagger, run]

  docs:format:
    desc: Format swagger docs
    cmds:
      - swag fmt

  #lint

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run

  # minikube

  minikube-build:
    desc: Build images in minikube Docker context
    cmd: eval $(minikube -p minikube docker-env) && task docker:build

  minikube-start:
    desc: Start minikube cluster
    cmds:
      - minikube start

  minikube-stop:
    desc: Stop minikube cluster
    cmds:
      - minikube stop

  # kubernetes
  k8s-db-nats:
    desc: Deploy to kubernetes
    cmds:
      - kubectl apply -f k8s/namespace.yaml
      - kubectl apply -f k8s/config/
      - kubectl apply -f k8s/postgres/
      - kubectl apply -f k8s/nats/

  k8s-deploy-microservices:
    desc: Deploy only app microservices
    cmds:
      - kubectl apply -f k8s/identity/
      - kubectl apply -f k8s/account-profile/
      - kubectl apply -f k8s/outbox-publisher/
      - kubectl apply -f k8s/gateway/

  k8s-delete:
    desc: Delete all k8s resources
    cmd: kubectl delete namespace rekreativko

  k8s-status:
    desc: Show k8s resources
    cmd: kubectl get all -n rekreativko

  k8s-logs:
    desc: Show k8s logs
    cmd: kubectl logs -f -n rekreativko

  k8s-forward-db-port:
    desc: Forward k8s db port
    cmd:
      POSTGRES_POD=$(kubectl get pod -n rekreativko -l app=postgres -o jsonpath="{.items[0].metadata.name}") && echo $POSTGRES_POD \
      && kubectl port-forward -n rekreativko pod/$POSTGRES_POD 5433:5432

  k8s-forward-gw-port:
    desc: Forward k8s gateway port
    cmd:
      GATEWAY_POD=$(kubectl get pod -n rekreativko -l app=gateway -o jsonpath="{.items[0].metadata.name}") && echo $GATEWAY_POD \
      && kubectl port-forward -n rekreativko pod/$GATEWAY_POD 8080:8080

  k8s-forward-ap-port:
    desc: Forward k8s gateway port
    cmd:
      GATEWAY_POD=$(kubectl get pod -n rekreativko -l app=account-profile -o jsonpath="{.items[0].metadata.name}") && echo $GATEWAY_POD \
      && kubectl port-forward -n rekreativko pod/$GATEWAY_POD 8081:8081

  k8s-migrate:
    desc: Migrate k8s resources
    cmds:
      - migrate -path {{.MIGRATIONS_DIR}} -database "postgres://postgres:postgres@$localhost:5433/rekreativko?sslmode=disable" up
