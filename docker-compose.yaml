services:
  db:
    image: postgres:17.2
    container_name: rekreativko_db
    ports:
      - "5432:5432"
    volumes:
      - rekreativko_db:/var/lib/postgresql/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rekreativko"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rekreativko

  # api:
  #   build:
  #     context: .
  #     dockerfile: ./Dockerfile
  #   ports:
  #     - "8080:8080"
  #   env_file:
  #     - .env
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #   networks:
  #     - rekreativko
  #   develop:
  #     watch:
  #       - action: rebuild
  #         path: .
  #         ignore:
  #           - vendor/
  #           - .git/
  #           - .idea/
  #           - node_modules/

  redis:
    image: redis
    container_name: rekreativko_redis
    env_file:
      - .env
    ports:
      - "6379:6379"
    volumes:
      - rekreativko_redis:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rekreativko

  ## observability

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: rekreativko_jaeger
    ports:
      - "16686:16686" # UI
      - "4318:4318" # OTLP HTTP receiver
      - "14268:14268" # Jaeger collector
    env_file:
      - .env
    networks:
      - rekreativko

  prometheus:
    image: prom/prometheus:latest
    container_name: rekreativko_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    networks:
      - rekreativko

  grafana:
    image: grafana/grafana:latest
    container_name: rekreativko_grafana
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./observability/grafana/datasources:/etc/grafana/provisioning/datasources
      - ./observability/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - jaeger
    networks:
      - rekreativko

volumes:
  rekreativko_db:
  rekreativko_redis:
  prometheus-data:
  grafana-data:

networks:
  rekreativko:
    driver: bridge
