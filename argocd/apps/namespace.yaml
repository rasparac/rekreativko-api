apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rekreativko-namespace
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io

spec:
  project: default

  source:
    repoURL: https://github.com/rasparac/rekreativko-api.git
    targetRevision: HEAD
    path: k8s/namespace.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true # delete resources removed from git
      selfHeal: true # revert manual changes to cluster
