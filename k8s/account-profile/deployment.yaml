apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-profile
  namespace: rekreativko
spec:
  replicas: 2
  selector:
    matchLabels:
      app: account-profile
  template:
    metadata:
      labels:
        app: account-profile
    spec:
      containers:
        - name: account-profile
          image: rekreativko/account-profile:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8082
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          env:
            - name: PORT
              value: "8082"
            - name: SERVICE_NAME
              value: "account-profile"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          startupProbe:
            httpGet:
              path: /health
              port: 8082
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 30
